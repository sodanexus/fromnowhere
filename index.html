<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FROM NOWHERE — Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #f5f2ec;
    --white: #0a0a0a;
    --grey: #6a6660;
    --sidebar: 200px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Space Mono', monospace;
    cursor: none;
  }

  /* CURSOR */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--black);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 30px; height: 30px;
    border: 1px solid rgba(245,242,236,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, opacity 0.3s;
  }

  /* PAGE LAYOUT */
  .page {
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  aside {
    position: fixed;
    top: 0; left: 0;
    width: var(--sidebar);
    height: 100vh;
    padding: 40px 28px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.07);
    background: var(--white);
    z-index: 100;
  }

  .logo { margin-bottom: 52px; }
  .logo img {
    width: 120px;
    display: block;
  }
  .logo-tag {
    display: block;
    margin-top: 6px;
    font-size: 7px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--grey);
  }

  nav .nav-label {
    display: block;
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 14px;
  }

  nav ul { list-style: none; margin-bottom: 36px; }
  nav ul li { margin-bottom: 8px; }
  nav ul li a {
    font-size: 11px;
    color: var(--grey);
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: color 0.15s;
    display: block;
    cursor: none;
  }
  nav ul li a:hover,
  nav ul li a.active { color: var(--black); }

  .sidebar-footer {
    margin-top: auto;
    display: flex;
    gap: 14px;
  }
  .sidebar-footer a {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--grey);
    text-decoration: none;
    transition: color 0.15s;
    cursor: none;
  }
  .sidebar-footer a:hover { color: var(--black); }

  /* ── MAIN ── */
  main {
    margin-left: var(--sidebar);
    flex: 1;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    padding: 48px 20px 20px;
    font-size: 8px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--grey);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 20px;
  }

  /* ── GRILLE ARTWORK ── */
  .grid {
    padding: 0 20px 20px;
  }

  .grid-first {
    display: block;
    overflow: hidden;
    cursor: none;
    margin-bottom: 20px;
  }
  .grid-first img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .grid-first:hover img { transform: scale(1.04); }

  .grid-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .grid-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .grid-item {
    display: block;
    overflow: hidden;
    cursor: none;
    position: relative;
  }
  .grid-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .grid-item:hover img { transform: scale(1.04); }

  /* ── SECTION MOTION ── */
  #motion {
    padding: 0 20px 60px;
  }

  .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .video-item {
    position: relative;
    cursor: none;
  }

  /* Ratio 16/9 pour les vidéos */
  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    background: #111;
  }

  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Vidéo locale */
  .video-wrapper video {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Placeholder vidéo */
  .video-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--grey);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .play-icon {
    width: 40px; height: 40px;
    border: 1px solid var(--grey);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-icon::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 7px 0 7px 12px;
    border-color: transparent transparent transparent var(--grey);
    margin-left: 3px;
  }

  .video-item:hover .play-icon {
    border-color: var(--black);
  }
  .video-item:hover .play-icon::after {
    border-color: transparent transparent transparent var(--black);
  }

  /* Animations */
  .grid-first, .grid-item, .video-item {
    opacity: 0;
    animation: appear 0.5s ease forwards;
  }
  .grid-first { animation-delay: 0.05s; }
  .grid-col:nth-child(1) .grid-item:nth-child(1) { animation-delay: 0.12s; }
  .grid-col:nth-child(2) .grid-item:nth-child(1) { animation-delay: 0.18s; }
  .grid-col:nth-child(1) .grid-item:nth-child(2) { animation-delay: 0.24s; }
  .grid-col:nth-child(2) .grid-item:nth-child(2) { animation-delay: 0.30s; }
  .grid-col:nth-child(1) .grid-item:nth-child(3) { animation-delay: 0.36s; }
  .grid-col:nth-child(2) .grid-item:nth-child(3) { animation-delay: 0.42s; }
  .grid-col:nth-child(1) .grid-item:nth-child(4) { animation-delay: 0.48s; }
  .grid-col:nth-child(2) .grid-item:nth-child(4) { animation-delay: 0.54s; }
  .video-item:nth-child(1) { animation-delay: 0.1s; }
  .video-item:nth-child(2) { animation-delay: 0.2s; }
  .video-item:nth-child(3) { animation-delay: 0.3s; }
  .video-item:nth-child(4) { animation-delay: 0.4s; }

  @keyframes appear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="ring"></div>

<div class="page">

  <!-- ═══ SIDEBAR ═══ -->
  <aside>
    <div class="logo">
      <img src="logo.png" alt="From Nowhere">
      <span class="logo-tag">Creative Agency</span>
    </div>

    <nav>
      <span class="nav-label">Work</span>
      <ul>
        <li><a href="#artwork" class="active" data-section="artwork">Artwork</a></li>
        <li><a href="#motion" data-section="motion">Motion</a></li>
      </ul>
      <ul>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <a href="#">Ig</a>
      <a href="#">Be</a>
      <a href="#">Ln</a>
      <a href="#">Tw</a>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main>

    <!-- ── SECTION ARTWORK ── -->
    <section id="artwork">
      <div class="section-label">Artwork</div>
      <div class="grid">

        <a href="#" class="grid-first">
          <img src="1.jpg" alt="Projet 1">
        </a>

        <div class="grid-cols">
          <div class="grid-col">
            <a href="#" class="grid-item"><img src="2.jpg" alt="Projet 2"></a>
            <a href="#" class="grid-item"><img src="4.jpg" alt="Projet 4"></a>
            <a href="#" class="grid-item"><img src="7.jpg" alt="Projet 7"></a>
            <a href="#" class="grid-item"><img src="8.jpg" alt="Projet 8"></a>
            <a href="#" class="grid-item"><img src="10.jpg" alt="Projet 10"></a>
          </div>
          <div class="grid-col">
            <a href="#" class="grid-item"><img src="3.jpg" alt="Projet 3"></a>
            <a href="#" class="grid-item"><img src="5.jpg" alt="Projet 5"></a>
            <a href="#" class="grid-item"><img src="6.jpg" alt="Projet 6"></a>
            <a href="#" class="grid-item"><img src="9.jpg" alt="Projet 9"></a>
          </div>
        </div>

      </div>
    </section>

    <!-- ── SECTION MOTION ── -->
    <section id="motion">
      <div class="section-label">Motion</div>
      <div id="motion" class="video-grid">

        <!-- Remplace src par ton lien YouTube/Vimeo ou chemin local -->
        <div class="video-item">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/R8o8cWErI5M" allowfullscreen></iframe>
          </div>
        </div>

        <div class="video-item">
          <div class="video-wrapper">
            <iframe src="https://www.youtube-nocookie.com/embed/d68toBv-wqo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
          </div>
        </div>

        <div class="video-item">
          <div class="video-wrapper">
            <div class="video-placeholder">
              <div class="play-icon"></div>
              <span>Video 03</span>
            </div>
          </div>
        </div>

        <div class="video-item">
          <div class="video-wrapper">
            <div class="video-placeholder">
              <div class="play-icon"></div>
              <span>Video 04</span>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
  });

  (function tick() {
    rx += (mx - rx) * 0.1;
    ry += (my - ry) * 0.1;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(tick);
  })();

  document.querySelectorAll('.grid-item, .grid-first, .video-item').forEach(el => {
    el.addEventListener('mouseenter', () => {
      ring.style.width = '56px';
      ring.style.height = '56px';
      ring.style.opacity = '0.3';
    });
    el.addEventListener('mouseleave', () => {
      ring.style.width = '30px';
      ring.style.height = '30px';
      ring.style.opacity = '1';
    });
  });

  // Nav scroll + active
  document.querySelectorAll('nav a[data-section]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = document.getElementById(a.dataset.section);
      if (target) target.scrollIntoView({ behavior: 'smooth' });
      document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
    });
  });

  // Active nav on scroll
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('nav a[data-section]');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => {
          a.classList.toggle('active', a.dataset.section === entry.target.id);
        });
      }
    });
  }, { threshold: 0.3 });

  sections.forEach(s => observer.observe(s));
</script>
</body>
</html>
