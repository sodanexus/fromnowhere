<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — From Nowhere</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #f5f2ec;
    --white: #0a0a0a;
    --grey: #6a6660;
    --border: rgba(255,255,255,0.07);
    --font-serif: 'Cormorant Garamond', serif;
    --font-mono: 'Space Mono', monospace;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--white);
    color: var(--black);
    font-family: var(--font-mono);
    cursor: none;
  }

  /* ── CURSOR ── */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--black);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 30px; height: 30px;
    border: 1px solid rgba(245,242,236,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, opacity 0.3s;
  }

  /* ── LAYOUT ── */
  .page {
    display: grid;
    grid-template-columns: 200px 1fr;
    height: 100vh;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 40px 28px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .logo { margin-bottom: 52px; }
  .logo img { width: 120px; display: block; }
  .logo-tag {
    display: block;
    margin-top: 6px;
    font-size: 7px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--grey);
  }

  .nav-label {
    display: block;
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 14px;
  }

  .sidebar-footer {
    margin-top: auto;
    display: flex;
    gap: 14px;
  }
  .sidebar-footer a {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--grey);
    text-decoration: none;
    transition: color 0.15s;
    cursor: none;
  }
  .sidebar-footer a:hover { color: var(--black); }

  /* ── MAIN ── */
  main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px;
    position: relative;
    overflow: hidden;
  }

  /* big background number */
  .bg-number {
    position: absolute;
    right: -0.05em;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(260px, 30vw, 420px);
    line-height: 1;
    color: rgba(245,242,236,0.03);
    pointer-events: none;
    user-select: none;
    letter-spacing: -0.04em;
    animation: fadeIn 1.2s ease both;
    animation-delay: 0.1s;
  }

  .content { position: relative; z-index: 1; }

  .eyebrow {
    font-size: 8px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 28px;
    opacity: 0;
    animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay: 0.3s;
  }

  .title {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(52px, 7vw, 96px);
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 32px;
    opacity: 0;
    animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay: 0.45s;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin-bottom: 32px;
    opacity: 0;
    animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay: 0.55s;
  }

  .sub {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 0.05em;
    line-height: 1.8;
    margin-bottom: 52px;
    opacity: 0;
    animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay: 0.65s;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--black);
    text-decoration: none;
    cursor: none;
    opacity: 0;
    animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay: 0.75s;
    width: fit-content;
    transition: gap 0.25s ease;
  }
  .home-link:hover { gap: 20px; }
  .home-link::before {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: var(--black);
    transition: width 0.25s ease;
  }
  .home-link:hover::before { width: 42px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    html, body { overflow: auto; cursor: auto; }
    .cursor, .cursor-ring { display: none; }
    .page { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
    aside {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 24px;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
    .logo { margin-bottom: 0; }
    .logo img { width: 90px; }
    .logo-tag, .nav-label, .sidebar-footer { display: none; }
    main { padding: 52px 28px 60px; justify-content: flex-start; min-height: calc(100vh - 80px); }
    .bg-number { font-size: 200px; }
  }
</style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="ring"></div>

  <div class="page">
    <aside>
      <div class="logo">
        <a href="https://fromnowhere.fr" style="cursor:none;">
          <img src="logo.png" alt="From Nowhere">
        </a>
        <span class="logo-tag">Creative Agency</span>
      </div>
      <span class="nav-label">Error</span>
      <div class="sidebar-footer">
        <a href="mailto:fromnowhere@ik.me">Contact</a>
      </div>
    </aside>

    <main>
      <div class="bg-number">404</div>
      <div class="content">
        <p class="eyebrow">Error 404 &nbsp;/&nbsp; Page not found</p>
        <h1 class="title">Lost<br>somewhere.</h1>
        <div class="divider"></div>
        <p class="sub">This page doesn't exist or has been moved.<br>It happens to the best of us.</p>
        <a href="https://fromnowhere.fr" class="home-link">Back to home</a>
      </div>
    </main>
  </div>

<script>
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  if (!isMobile) {
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });
    (function tick() {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(tick);
    })();
  }
</script>
</body>
</html>
