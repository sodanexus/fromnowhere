<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — From Nowhere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #f5f2ec;
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: none;
    overflow: hidden;
  }

  /* Cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: #f5f2ec;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 30px; height: 30px;
    border: 1px solid rgba(245,242,236,0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s;
  }

  /* Grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: fadeIn 1s 0.2s forwards;
  }

  .number {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(120px, 20vw, 240px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: #f5f2ec;
    display: block;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 2.5vw, 28px);
    color: #6a6660;
    margin-top: 16px;
    margin-bottom: 52px;
    letter-spacing: 0.04em;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(245,242,236,0.15);
    margin: 0 auto 48px;
  }

  .back-link {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6a6660;
    text-decoration: none;
    transition: color 0.2s, letter-spacing 0.2s;
    cursor: none;
  }
  .back-link:hover {
    color: #f5f2ec;
    letter-spacing: 0.4em;
  }

  .logo {
    position: fixed;
    top: 40px;
    left: 40px;
    z-index: 10;
  }
  .logo img {
    width: 100px;
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="ring"></div>

<div class="logo">
  <img src="logo.png" alt="From Nowhere">
</div>

<div class="container">
  <span class="number">404</span>
  <p class="tagline">This page came from nowhere<br>and went back there.</p>
  <div class="divider"></div>
  <a href="index.html" class="back-link">Return to portfolio</a>
</div>

<script>
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
  });

  (function tick() {
    rx += (mx - rx) * 0.1;
    ry += (my - ry) * 0.1;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(tick);
  })();
</script>
</body>
</html>
